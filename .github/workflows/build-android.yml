name: Vinyas Android Build

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vinyas-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android via Expo Prebuild & Gradle
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Vinyas-Android-APK
          path: ./vinyas-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
