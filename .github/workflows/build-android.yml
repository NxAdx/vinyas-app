name: Vinyas Android Build

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vinyas-app/package-lock.json

      - name: Install dependencies
        run: |
          cd vinyas-app
          npm ci

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android via Expo Prebuild & Gradle
        run: |
          cd vinyas-app
          # Remove --clean to avoid wiping native folder if it exists in cache (though currently not cached)
          # --no-install skips the redundant npm install inside prebuild
          npx expo prebuild --platform android --no-install
          cd android
          # --no-daemon is safer for CI; --max-workers helps parallelize but GitHub runners are limited
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: Vinyas-Android-APKs
          path: vinyas-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 7
